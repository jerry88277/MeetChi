steps:
  # Step 1: Download model from GCS into workspace (Cloud Build SA has creds)
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'download-model'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p models/pyannote
        gsutil -m cp -r gs://prj-ai-meetchi-du-meetchi-audio/models/pyannote/speaker-diarization-community-1 models/pyannote/
        # Allow models dir in dockerignore for this build
        sed -i '/^models\//d' .dockerignore
        sed -i '/^\*\.bin$/d' .dockerignore
        echo "✓ Model downloaded, .dockerignore patched"
        ls -la models/pyannote/speaker-diarization-community-1/

  # Step 2: Build Docker image (use --cache-from for faster builds when only source changed)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:v18-community1 || true'
    waitFor: ['download-model']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--cache-from'
      - 'asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:v18-community1'
      - '-f'
      - 'Dockerfile.gpu-service-community1'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:v18-community1'
      - '.'
    waitFor: ['pull-cache']

images:
  - 'asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:v18-community1'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: '3600s'
