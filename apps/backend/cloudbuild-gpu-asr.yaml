# ⛔ DEPRECATED — 請勿用於生產 GPU 部署（2026-07-08）
# 此 config 使用 Dockerfile.gpu-service，**不會 bake pyannote 模型、不設 PYANNOTE_MODEL_PATH**，
# 導致 diarization 退回 runtime HF 下載 → 失敗 → 整場 0 說話者標籤（見 agents.md §7、devlog 2026-07-08）。
# ✅ 生產 GPU image 一律用：apps/backend/cloudbuild-community1.yaml（含 baked pyannote）。
# 本檔僅保留供「無 diarization 需求」的實驗用途。
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.gpu-service'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:latest'
      - '.'
images:
  - 'asia-southeast1-docker.pkg.dev/prj-ai-meetchi-du/meetchi/meetchi-gpu-asr:latest'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
