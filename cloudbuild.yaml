# ============================================
# MeetChi Cloud Build - Backend Only
# Build & push: meetchi-backend image
# Usage: gcloud builds submit . --config=cloudbuild.yaml
# ============================================

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _TAG: 'latest'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    dir: 'apps/backend'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
    waitFor:
      - 'build-backend'

images:
  - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
