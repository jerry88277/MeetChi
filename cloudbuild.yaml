# ============================================
# MeetChi Cloud Build - Build & Push Images
# Simplified: Build images only, deploy via Terraform
# ============================================

timeout: '3600s'  # 1 hour timeout

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _TAG: 'latest'

steps:
  # ============================================
  # Step 1: Build Backend Image
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    dir: 'apps/backend'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
      - '.'

  # ============================================
  # Step 3: Push Backend Image
  # ============================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
    waitFor:
      - 'build-backend'

  # ============================================
  # Step 4: List images
  # ============================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'list-images'
    args:
      - 'artifacts'
      - 'docker'
      - 'images'
      - 'list'
      - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi'
    waitFor:
      - 'push-backend'

images:
  - 'asia-southeast1-docker.pkg.dev/${PROJECT_ID}/meetchi/meetchi-backend:${_TAG}'
